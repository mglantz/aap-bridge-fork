          - ""
          - "2. Vault-Backed AWS Credential"
          - "   • Type: Amazon Web Services"
          - "   • Organization: Cloud Services"
          - "   • Vault Source: Production HashiCorp Vault"
          - "   • Input Sources:"
          - "     - Access Key: aws/creds/aap-automation-role → access_key"
          - "     - Secret Key: aws/creds/aap-automation-role → secret_key"
          - "   • Dynamic Credentials: Yes (Vault generates on-demand)"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "OAUTH2 GRANT TYPES:"
          - "═══════════════════════════════════════════════════════════════"
          - "  • Authorization Code: User interactive (Prometheus, Grafana)"
          - "  • Client Credentials: Service-to-service (Splunk, Datadog)"
