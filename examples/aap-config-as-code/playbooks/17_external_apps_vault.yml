          - "  • Kubernetes: Cloud (service account JWT)"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "CREDENTIAL INPUT SOURCES:"
          - "═══════════════════════════════════════════════════════════════"
          - "  Input sources allow credentials to dynamically fetch secrets"
          - "  from external systems like HashiCorp Vault at job runtime."
          - ""
          - "  SSH Credential Example:"
          - "    • Password: Fetched from Vault path secret/data/ssh/production"
          - "    • SSH Key: Fetched from Vault path secret/data/ssh/production"
          - ""
          - "  AWS Credential Example:"
          - "    • Access Key: Dynamically generated by Vault AWS engine"
          - "    • Secret Key: Dynamically generated by Vault AWS engine"
          - "    • Vault path: aws/creds/aap-automation-role"
