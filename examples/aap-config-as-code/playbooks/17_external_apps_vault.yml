          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "OAuth2 Applications Migration:"
          - "  ✓ OAuth2 application definitions"
          - "  ✓ Client IDs and secrets"
          - "  ✓ Authorization grant types"
          - "  ✓ Redirect URIs"
          - "  ✓ Organization associations"
          - "  ✓ Token scopes and permissions"
          - ""
          - "HashiCorp Vault Integration Migration:"
          - "  ✓ Vault credential configurations"
          - "  ✓ Multiple Vault auth methods (AppRole, Token, K8s)"
          - "  ✓ Vault namespaces"
          - "  ✓ API versions (v1, v2)"
          - "  ✓ Custom CA certificates"
          - "  ✓ Credential input sources"
          - "  ✓ Dynamic secret fetching"
          - "  ✓ Secret path mappings"
          - ""
          - "Verification Commands:"
          - "  • List OAuth apps: curl -sk -H 'Authorization: Bearer TOKEN' \\"
          - "    https://localhost:8443/api/v2/applications/"
          - "  • List Vault creds: curl -sk -H 'Authorization: Bearer TOKEN' \\"
          - "    https://localhost:8443/api/v2/credentials/?credential_type__kind=vault"
          - "  • View input sources: curl -sk -H 'Authorization: Bearer TOKEN' \\"
