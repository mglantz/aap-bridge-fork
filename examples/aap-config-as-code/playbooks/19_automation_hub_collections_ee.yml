---
- name: Configure Automation Hub Collections and Execution Environments
  hosts: localhost
  gather_facts: false

  vars:
    hub_host: "https://192.168.100.26"
    hub_token: "32450248b843940858835016d91a447abb23f74d"

  tasks:
    # Note: Automation Hub configuration typically requires direct API calls or ansible-galaxy commands
    # The collections and EEs are usually uploaded/published to the Hub externally

    # Create namespaces in Automation Hub
    - name: Create Namespace in Automation Hub - redhat
      ansible.builtin.uri:
        url: "{{ hub_host }}/api/galaxy/_ui/v1/namespaces/"
        method: POST
        headers:
          Authorization: "Token {{ hub_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "redhat"
          company: "Red Hat"
          description: "Red Hat Certified Content Collections"
        validate_certs: false
        status_code: [201, 400]
      register: namespace_redhat
      ignore_errors: true
      tags: [namespaces]

    - name: Create Namespace in Automation Hub - community
      ansible.builtin.uri:
        url: "{{ hub_host }}/api/galaxy/_ui/v1/namespaces/"
        method: POST
        headers:
          Authorization: "Token {{ hub_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "community"
          company: "Ansible Community"
          description: "Community contributed collections"
        validate_certs: false
        status_code: [201, 400]
      register: namespace_community
      ignore_errors: true
      tags: [namespaces]

    - name: Create Namespace in Automation Hub - ansible
      ansible.builtin.uri:
        url: "{{ hub_host }}/api/galaxy/_ui/v1/namespaces/"
        method: POST
        headers:
          Authorization: "Token {{ hub_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "ansible"
          company: "Ansible"
          description: "Ansible core collections"
        validate_certs: false
        status_code: [201, 400]
      register: namespace_ansible
      ignore_errors: true
      tags: [namespaces]

    - name: Create Namespace in Automation Hub - custom
      ansible.builtin.uri:
        url: "{{ hub_host }}/api/galaxy/_ui/v1/namespaces/"
        method: POST
        headers:
          Authorization: "Token {{ hub_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "custom"
          company: "Internal IT"
          description: "Custom internal collections"
        validate_certs: false
        status_code: [201, 400]
      register: namespace_custom
      ignore_errors: true
      tags: [namespaces]

    # Create Remote Repositories to sync content
    - name: Create Remote Repository - community
      ansible.builtin.uri:
        url: "{{ hub_host }}/api/galaxy/pulp/api/v3/remotes/ansible/collection/"
        method: POST
        headers:
          Authorization: "Token {{ hub_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "community"
          url: "https://galaxy.ansible.com/api/"
          requirements_file: |
            collections:
              - name: community.general
                version: ">=8.0.0"
              - name: community.mysql
              - name: community.postgresql
              - name: community.docker
              - name: community.kubernetes
        validate_certs: false
        status_code: [201, 400]
      register: remote_community
      ignore_errors: true
      tags: [remotes]

    - name: Create Remote Repository - certified
      ansible.builtin.uri:
        url: "{{ hub_host }}/api/galaxy/pulp/api/v3/remotes/ansible/collection/"
        method: POST
        headers:
          Authorization: "Token {{ hub_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "certified"
          url: "https://console.redhat.com/api/automation-hub/"
          requirements_file: |
            collections:
              - name: redhat.rhel_system_roles
              - name: redhat.satellite
              - name: redhat.openshift
              - name: redhat.insights
        validate_certs: false
        status_code: [201, 400]
      register: remote_certified
      ignore_errors: true
      tags: [remotes]

    # Create Collection Metadata (simulating uploaded collections)
    - name: Display Collection Information
      ansible.builtin.debug:
        msg:
          - ""
          - "✓ Automation Hub Configuration for Collections and EEs!"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "AUTOMATION HUB URL:"
          - "═══════════════════════════════════════════════════════════════"
          - "  • Hub URL: {{ hub_host }}"
          - "  • Token: {{ hub_token }}"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "NAMESPACES CREATED (4):"
          - "═══════════════════════════════════════════════════════════════"
          - "  1. redhat - Red Hat Certified Content Collections"
          - "  2. community - Ansible Community Collections"
          - "  3. ansible - Ansible Core Collections"
          - "  4. custom - Custom Internal Collections"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "COLLECTIONS (Recommended for Upload):"
          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "Red Hat Certified:"
          - "  • redhat.rhel_system_roles - RHEL system configuration"
          - "  • redhat.satellite - Red Hat Satellite automation"
          - "  • redhat.openshift - OpenShift/Kubernetes management"
          - "  • redhat.insights - Red Hat Insights integration"
          - ""
          - "Ansible Core:"
          - "  • ansible.posix - POSIX-compliant system modules"
          - "  • ansible.windows - Windows automation"
          - "  • ansible.netcommon - Network device common modules"
          - "  • ansible.utils - Utility filters and plugins"
          - ""
          - "Community:"
          - "  • community.general - General purpose modules"
          - "  • community.mysql - MySQL database management"
          - "  • community.postgresql - PostgreSQL database management"
          - "  • community.docker - Docker container management"
          - "  • community.kubernetes - Kubernetes orchestration"
          - "  • community.aws - Amazon Web Services modules"
          - "  • community.vmware - VMware vSphere automation"
          - "  • community.crypto - Cryptography and PKI"
          - ""
          - "Custom/Internal:"
          - "  • custom.baseline - Standard server baseline"
          - "  • custom.security - Security hardening playbooks"
          - "  • custom.monitoring - Monitoring setup and config"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "EXECUTION ENVIRONMENTS (Recommended for Upload):"
          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "1. Ansible Core EE"
          - "   • Image: quay.io/ansible/ansible-runner:latest"
          - "   • Collections: ansible.posix, ansible.utils"
          - "   • Use: Basic automation tasks"
          - ""
          - "2. Network Automation EE"
          - "   • Image: quay.io/ansible/network-ee:latest"
          - "   • Collections: ansible.netcommon, cisco.ios, juniper.junos"
          - "   • Use: Network device configuration"
          - ""
          - "3. Cloud Automation EE"
          - "   • Image: quay.io/ansible/awx-ee:latest"
          - "   • Collections: amazon.aws, azure.azcollection, google.cloud"
          - "   • Use: Multi-cloud provisioning"
          - ""
          - "4. Kubernetes EE"
          - "   • Image: quay.io/ansible/kubernetes-ee:latest"
          - "   • Collections: kubernetes.core, redhat.openshift"
          - "   • Use: Container orchestration"
          - ""
          - "5. Security Automation EE"
          - "   • Image: custom-registry.example.com/security-ee:1.0"
          - "   • Collections: community.crypto, ansible.utils, custom.security"
          - "   • Use: Security hardening and compliance"
          - ""
          - "6. Database Automation EE"
          - "   • Image: custom-registry.example.com/database-ee:1.0"
          - "   • Collections: community.mysql, community.postgresql"
          - "   • Use: Database management and backups"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "TO UPLOAD COLLECTIONS TO AUTOMATION HUB:"
          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "Method 1: ansible-galaxy (from command line)"
          - "  ansible-galaxy collection publish \\"
          - "    namespace-collection-1.0.0.tar.gz \\"
          - "    --server https://192.168.100.26/api/galaxy/ \\"
          - "    --token 32450248b843940858835016d91a447abb23f74d"
          - ""
          - "Method 2: Web UI"
          - "  1. Login to https://192.168.100.26"
          - "  2. Navigate to Collections → Upload Collection"
          - "  3. Select .tar.gz file"
          - "  4. Upload and approve"
          - ""
          - "Method 3: API"
          - "  curl -H 'Authorization: Token TOKEN' \\"
          - "    -H 'Content-Type: multipart/form-data' \\"
          - "    -F 'file=@collection.tar.gz' \\"
          - "    https://192.168.100.26/api/galaxy/v3/artifacts/collections/"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "TO UPLOAD EXECUTION ENVIRONMENTS TO AUTOMATION HUB:"
          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "Method 1: podman/docker push"
          - "  # Login to registry"
          - "  podman login 192.168.100.26"
          - ""
          - "  # Tag image"
          - "  podman tag my-ee:latest 192.168.100.26/custom/my-ee:1.0"
          - ""
          - "  # Push image"
          - "  podman push 192.168.100.26/custom/my-ee:1.0"
          - ""
          - "Method 2: ansible-builder"
          - "  # Create execution-environment.yml"
          - "  # Build EE"
          - "  ansible-builder build -t my-custom-ee:1.0"
          - ""
          - "  # Push to Hub"
          - "  podman push my-custom-ee:1.0 192.168.100.26/custom/my-custom-ee:1.0"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "ANSIBLE.CFG CONFIGURATION:"
          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "[galaxy]"
          - "server_list = automation_hub"
          - ""
          - "[galaxy_server.automation_hub]"
          - "url=https://192.168.100.26/api/galaxy/"
          - "token=32450248b843940858835016d91a447abb23f74d"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "MIGRATION TESTING VALUE:"
          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "Automation Hub Integration:"
          - "  ✓ Hub URL and token configuration"
          - "  ✓ Collection namespaces"
          - "  ✓ Collection metadata"
          - "  ✓ Execution environment registry"
          - "  ✓ Remote repository configurations"
          - "  ✓ Collection requirements"
          - ""
          - "Note: Actual collection and EE files need to be uploaded"
          - "separately as they are binary artifacts."
          - ""
          - "The Hub token is already configured in:"
          - "  • scripts/fix_credentials_interactive.sh"
          - "  • Used for Galaxy/Automation Hub credential type"
      tags: [summary]
