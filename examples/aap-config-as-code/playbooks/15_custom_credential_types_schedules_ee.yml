---
- name: Create Custom Credential Types, Schedules, and Execution Environments
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../vars/aap_config.yml

  tasks:
    # Create Custom Credential Types
    - name: Create Custom Credential Types
      awx.awx.credential_type:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        kind: "{{ item.kind }}"
        inputs: "{{ item.inputs }}"
        injectors: "{{ item.injectors }}"
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        # API Token Credential Type
        - name: API Token
          description: Generic API token credential
          kind: cloud
          inputs:
            fields:
              - id: api_token
                type: string
                label: API Token
                secret: true
              - id: api_url
                type: string
                label: API URL
              - id: verify_ssl
                type: boolean
                label: Verify SSL
                default: true
            required:
              - api_token
              - api_url
          injectors:
            env:
              API_TOKEN: !unsafe "{{ api_token }}"
              API_URL: !unsafe "{{ api_url }}"
              VERIFY_SSL: !unsafe "{{ verify_ssl }}"

        # Database Connection Credential Type
        - name: Database Connection
          description: Database connection credentials
          kind: cloud
          inputs:
            fields:
              - id: db_host
                type: string
                label: Database Host
              - id: db_port
                type: string
                label: Database Port
                default: "5432"
              - id: db_name
                type: string
                label: Database Name
              - id: db_username
                type: string
                label: Database Username
              - id: db_password
                type: string
                label: Database Password
                secret: true
              - id: db_ssl_mode
                type: string
                label: SSL Mode
                default: require
                choices:
                  - disable
                  - allow
                  - prefer
                  - require
                  - verify-ca
                  - verify-full
            required:
              - db_host
              - db_name
              - db_username
              - db_password
          injectors:
            env:
              DATABASE_HOST: !unsafe "{{ db_host }}"
              DATABASE_PORT: !unsafe "{{ db_port }}"
              DATABASE_NAME: !unsafe "{{ db_name }}"
              DATABASE_USER: !unsafe "{{ db_username }}"
              DATABASE_PASSWORD: !unsafe "{{ db_password }}"
              DATABASE_SSLMODE: !unsafe "{{ db_ssl_mode }}"
            extra_vars:
              db_connection_string: !unsafe "postgresql://{{ db_username }}:{{ db_password }}@{{ db_host }}:{{ db_port }}/{{ db_name }}?sslmode={{ db_ssl_mode }}"

        # Custom SSH with Passphrase
        - name: SSH Key with Passphrase
          description: SSH key with passphrase and sudo password
          kind: cloud
          inputs:
            fields:
              - id: ssh_username
                type: string
                label: SSH Username
              - id: ssh_key
                type: string
                label: SSH Private Key
                secret: true
                multiline: true
              - id: ssh_passphrase
                type: string
                label: SSH Key Passphrase
                secret: true
              - id: sudo_password
                type: string
                label: Sudo Password
                secret: true
            required:
              - ssh_username
              - ssh_key
          injectors:
            env:
              ANSIBLE_NET_USERNAME: !unsafe "{{ ssh_username }}"
            extra_vars:
              ansible_user: !unsafe "{{ ssh_username }}"
              ansible_ssh_private_key_file: !unsafe "{{ tower.filename.ssh_key }}"
              ansible_become_password: !unsafe "{{ sudo_password }}"
            file:
              template.ssh_key: !unsafe "{{ ssh_key }}"

        # Slack/Teams Notification Credential
        - name: Notification Webhook
          description: Webhook for notifications (Slack, Teams, etc.)
          kind: cloud
          inputs:
            fields:
              - id: webhook_url
                type: string
                label: Webhook URL
                secret: true
              - id: webhook_type
                type: string
                label: Webhook Type
                choices:
                  - slack
                  - teams
                  - discord
                  - generic
              - id: channel
                type: string
                label: Channel/Room
          injectors:
            env:
              WEBHOOK_URL: !unsafe "{{ webhook_url }}"
              WEBHOOK_TYPE: !unsafe "{{ webhook_type }}"
              WEBHOOK_CHANNEL: !unsafe "{{ channel }}"

        # Custom Cloud Provider Credential
        - name: Custom Cloud Provider
          description: Custom cloud provider API credentials
          kind: cloud
          inputs:
            fields:
              - id: cloud_api_key
                type: string
                label: API Key
                secret: true
              - id: cloud_api_secret
                type: string
                label: API Secret
                secret: true
              - id: cloud_region
                type: string
                label: Region
                default: us-east-1
              - id: cloud_endpoint
                type: string
                label: API Endpoint
              - id: cloud_project_id
                type: string
                label: Project/Tenant ID
            required:
              - cloud_api_key
              - cloud_api_secret
          injectors:
            env:
              CLOUD_API_KEY: !unsafe "{{ cloud_api_key }}"
              CLOUD_API_SECRET: !unsafe "{{ cloud_api_secret }}"
              CLOUD_REGION: !unsafe "{{ cloud_region }}"
              CLOUD_ENDPOINT: !unsafe "{{ cloud_endpoint }}"
              CLOUD_PROJECT_ID: !unsafe "{{ cloud_project_id }}"

        # ServiceNow Credential Type
        - name: ServiceNow
          description: ServiceNow instance credentials
          kind: cloud
          inputs:
            fields:
              - id: snow_instance
                type: string
                label: Instance URL
              - id: snow_username
                type: string
                label: Username
              - id: snow_password
                type: string
                label: Password
                secret: true
              - id: snow_client_id
                type: string
                label: Client ID (OAuth)
              - id: snow_client_secret
                type: string
                label: Client Secret (OAuth)
                secret: true
            required:
              - snow_instance
          injectors:
            env:
              SNOW_INSTANCE: !unsafe "{{ snow_instance }}"
              SNOW_USERNAME: !unsafe "{{ snow_username }}"
              SNOW_PASSWORD: !unsafe "{{ snow_password }}"
              SNOW_CLIENT_ID: !unsafe "{{ snow_client_id }}"
              SNOW_CLIENT_SECRET: !unsafe "{{ snow_client_secret }}"

        # Container Registry Credential
        - name: Container Registry
          description: Custom container registry credentials
          kind: cloud
          inputs:
            fields:
              - id: registry_url
                type: string
                label: Registry URL
              - id: registry_username
                type: string
                label: Username
              - id: registry_password
                type: string
                label: Password/Token
                secret: true
              - id: registry_verify_ssl
                type: boolean
                label: Verify SSL
                default: true
            required:
              - registry_url
              - registry_username
              - registry_password
          injectors:
            env:
              CONTAINER_REGISTRY_URL: !unsafe "{{ registry_url }}"
              CONTAINER_REGISTRY_USER: !unsafe "{{ registry_username }}"
              CONTAINER_REGISTRY_PASSWORD: !unsafe "{{ registry_password }}"
              CONTAINER_REGISTRY_VERIFY_SSL: !unsafe "{{ registry_verify_ssl }}"

        # Git Token Credential (for private repos)
        - name: Git Personal Access Token
          description: Git personal access token for HTTPS authentication
          kind: cloud
          inputs:
            fields:
              - id: git_token
                type: string
                label: Personal Access Token
                secret: true
              - id: git_username
                type: string
                label: Git Username
              - id: git_host
                type: string
                label: Git Host
                default: github.com
            required:
              - git_token
          injectors:
            env:
              GIT_TOKEN: !unsafe "{{ git_token }}"
              GIT_USERNAME: !unsafe "{{ git_username }}"
              GIT_HOST: !unsafe "{{ git_host }}"
            extra_vars:
              scm_url_override: !unsafe "https://{{ git_username }}:{{ git_token }}@{{ git_host }}"
      tags: [credential_types]

    # Create credentials using custom credential types
    - name: Create Credentials with Custom Types
      awx.awx.credential:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        organization: "{{ item.organization }}"
        credential_type: "{{ item.credential_type }}"
        inputs: "{{ item.inputs }}"
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        - name: Production API Token
          description: API token for production services
          organization: IT Operations
          credential_type: API Token
          inputs:
            api_token: prod-api-token-12345
            api_url: https://api.production.example.com
            verify_ssl: true

        - name: Production Database
          description: Production PostgreSQL database
          organization: IT Operations
          credential_type: Database Connection
          inputs:
            db_host: prod-db.example.com
            db_port: "5432"
            db_name: production
            db_username: prod_user
            db_password: SecureDBPass123!
            db_ssl_mode: require

        - name: Slack Notifications
          description: Slack webhook for job notifications
          organization: DevOps Platform
          credential_type: Notification Webhook
          inputs:
            webhook_url: https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXX
            webhook_type: slack
            channel: "#automation-alerts"

        - name: Private GitHub Token
          description: Personal access token for private repos
          organization: Global Engineering
          credential_type: Git Personal Access Token
          inputs:
            git_token: ghp_privatetoken123456789
            git_username: automation-bot
            git_host: github.com

        - name: ServiceNow Production
          description: ServiceNow production instance
          organization: IT Operations
          credential_type: ServiceNow
          inputs:
            snow_instance: https://prod.service-now.com
            snow_username: automation_user
            snow_password: SNowPass123!
      ignore_errors: true
      tags: [credentials]

    # Create Additional Execution Environments
    - name: Create Additional Execution Environments
      ansible.builtin.uri:
        url: "{{ controller_auth.controller_host }}/api/v2/execution_environments/"
        method: POST
        headers:
          Authorization: "Bearer {{ controller_auth.controller_oauthtoken }}"
          Content-Type: application/json
        body_format: json
        body:
          name: "{{ item.name }}"
          description: "{{ item.description }}"
          image: "{{ item.image }}"
          pull: "{{ item.pull }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
        status_code: [201, 400]
      loop:
        - name: Network Automation EE
          description: Execution environment for network automation
          image: quay.io/ansible/network-ee:latest
          pull: missing

        - name: ServiceNow EE
          description: Execution environment with ServiceNow collections
          image: quay.io/ansible/awx-ee:latest
          pull: missing

        - name: Security Scanning EE
          description: Execution environment for security scans
          image: quay.io/ansible/awx-ee:latest
          pull: missing

        - name: Windows Automation EE
          description: Execution environment for Windows automation
          image: quay.io/ansible/awx-ee:latest
          pull: missing

        - name: Database Automation EE
          description: Execution environment for database operations
          image: quay.io/ansible/awx-ee:latest
          pull: missing

        - name: Kubernetes EE
          description: Execution environment for Kubernetes/OpenShift
          image: quay.io/ansible/kubernetes-ee:latest
          pull: missing

        - name: Minimal EE
          description: Minimal execution environment for simple tasks
          image: quay.io/ansible/awx-minimal-ee:latest
          pull: missing
      register: ee_result
      ignore_errors: true
      tags: [execution_environments]

    # Create Schedules for Job Templates
    - name: Create Schedules for Job Templates
      awx.awx.schedule:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        unified_job_template: "{{ item.job_template }}"
        rrule: "{{ item.rrule }}"
        enabled: "{{ item.enabled }}"
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        # Daily schedules
        - name: Daily Production Backup
          description: Run production backup every day at 2 AM
          job_template: Backup Database - Prod
          rrule: DTSTART:20260101T020000Z RRULE:FREQ=DAILY;INTERVAL=1
          enabled: true

        - name: Daily Health Check
          description: Health check every day at 6 AM
          job_template: Run Health Check - Dev
          rrule: DTSTART:20260101T060000Z RRULE:FREQ=DAILY;INTERVAL=1
          enabled: true

        # Weekly schedules
        - name: Weekly Security Scan
          description: Security scan every Monday at 1 AM
          job_template: Security Scan - Prod
          rrule: DTSTART:20260105T010000Z RRULE:FREQ=WEEKLY;BYDAY=MO
          enabled: true

        - name: Weekly System Updates
          description: Update systems every Sunday at 3 AM
          job_template: Update System Packages
          rrule: DTSTART:20260104T030000Z RRULE:FREQ=WEEKLY;BYDAY=SU
          enabled: true

        # Monthly schedules
        - name: Monthly Full Backup
          description: Full backup on 1st of each month at midnight
          job_template: Backup Database - Prod
          rrule: DTSTART:20260101T000000Z RRULE:FREQ=MONTHLY;BYMONTHDAY=1
          enabled: true

        # Hourly schedule
        - name: Hourly Monitoring Check
          description: Monitoring stack check every 4 hours
          job_template: Install Monitoring Stack
          rrule: DTSTART:20260101T000000Z RRULE:FREQ=HOURLY;INTERVAL=4
          enabled: false

        # Every 6 hours
        - name: Database Integrity Check
          description: Check database integrity every 6 hours
          job_template: Configure Database - Prod
          rrule: DTSTART:20260101T000000Z RRULE:FREQ=HOURLY;INTERVAL=6
          enabled: true

        # Weekday schedule (Mon-Fri)
        - name: Weekday Deployment
          description: Deploy to dev every weekday at 9 AM
          job_template: Deploy Web Application - Dev
          rrule: DTSTART:20260105T090000Z RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR
          enabled: true

        # Bi-weekly schedule
        - name: Bi-weekly Infrastructure Review
          description: Infrastructure health check every 2 weeks
          job_template: Configure Infrastructure
          rrule: DTSTART:20260101T000000Z RRULE:FREQ=WEEKLY;INTERVAL=2
          enabled: true
      ignore_errors: true
      tags: [schedules]

    # Create Schedules for Project Updates
    - name: Create Schedules for Project Updates
      awx.awx.schedule:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        unified_job_template: "{{ item.project }}"
        rrule: "{{ item.rrule }}"
        enabled: "{{ item.enabled }}"
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        # Hourly project updates
        - name: Web App Project - Hourly Sync
          description: Sync web app project every hour
          project: Web Application Deployment
          rrule: DTSTART:20260101T000000Z RRULE:FREQ=HOURLY;INTERVAL=1
          enabled: true

        # Daily project updates
        - name: Infrastructure Project - Daily Sync
          description: Sync infrastructure project daily at 5 AM
          project: Infrastructure Configuration
          rrule: DTSTART:20260101T050000Z RRULE:FREQ=DAILY;INTERVAL=1
          enabled: true

        - name: Database Project - Daily Sync
          description: Sync database project daily at 4 AM
          project: Database Management
          rrule: DTSTART:20260101T040000Z RRULE:FREQ=DAILY;INTERVAL=1
          enabled: true

        # Every 30 minutes (very frequent)
        - name: Security Project - Frequent Sync
          description: Sync security project every 30 minutes
          project: Security Hardening
          rrule: DTSTART:20260101T000000Z RRULE:FREQ=MINUTELY;INTERVAL=30
          enabled: false

        # Every 12 hours
        - name: Monitoring Project - 12 Hour Sync
          description: Sync monitoring project every 12 hours
          project: Application Monitoring
          rrule: DTSTART:20260101T000000Z RRULE:FREQ=HOURLY;INTERVAL=12
          enabled: true
      ignore_errors: true
      tags: [schedules]

    # Create Schedules for Inventory Updates (SCM inventories)
    - name: Create Schedules for Inventory Source Updates
      ansible.builtin.uri:
        url: "{{ controller_auth.controller_host }}/api/v2/inventory_sources/?name={{ item.source_name | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ controller_auth.controller_oauthtoken }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        - source_name: Git Inventory Source
          schedule_name: Dynamic Inventory - Hourly Sync
          rrule: DTSTART:20260101T000000Z RRULE:FREQ=HOURLY;INTERVAL=1
        - source_name: Project Inventory File Source
          schedule_name: Project File Inventory - Daily Sync
          rrule: DTSTART:20260101T030000Z RRULE:FREQ=DAILY;INTERVAL=1
      register: inv_sources
      tags: [inventory_schedules]

    - name: Create Inventory Source Schedules
      ansible.builtin.uri:
        url: "{{ controller_auth.controller_host }}/api/v2/inventory_sources/{{ item.0.json.results[0].id }}/schedules/"
        method: POST
        headers:
          Authorization: "Bearer {{ controller_auth.controller_oauthtoken }}"
          Content-Type: application/json
        body_format: json
        body:
          name: "{{ item.1.schedule_name }}"
          description: "Scheduled update for {{ item.1.source_name }}"
          rrule: "{{ item.1.rrule }}"
          enabled: true
        validate_certs: "{{ controller_auth.validate_certs }}"
        status_code: [201, 400]
      loop: "{{ inv_sources.results | zip([{'source_name': 'Git Inventory Source', 'schedule_name': 'Dynamic Inventory - Hourly Sync', 'rrule': 'DTSTART:20260101T000000Z RRULE:FREQ=HOURLY;INTERVAL=1'}, {'source_name': 'Project Inventory File Source', 'schedule_name': 'Project File Inventory - Daily Sync', 'rrule': 'DTSTART:20260101T030000Z RRULE:FREQ=DAILY;INTERVAL=1'}]) | list }}"
      when: item.0.json.count > 0
      ignore_errors: true
      tags: [inventory_schedules]

    - name: Display Summary
      ansible.builtin.debug:
        msg:
          - ""
          - "✓ Custom Credential Types, Schedules, and Execution Environments created!"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "CUSTOM CREDENTIAL TYPES (8):"
          - "═══════════════════════════════════════════════════════════════"
          - "  1. API Token - Generic API authentication"
          - "  2. Database Connection - PostgreSQL/MySQL connections"
          - "  3. SSH Key with Passphrase - Enhanced SSH credentials"
          - "  4. Notification Webhook - Slack/Teams/Discord webhooks"
          - "  5. Custom Cloud Provider - Generic cloud API credentials"
          - "  6. ServiceNow - ServiceNow instance credentials"
          - "  7. Container Registry - Custom registry authentication"
          - "  8. Git Personal Access Token - Private repo access"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "CREDENTIALS USING CUSTOM TYPES (5):"
          - "═══════════════════════════════════════════════════════════════"
          - "  • Production API Token (IT Operations)"
          - "  • Production Database (IT Operations)"
          - "  • Slack Notifications (DevOps Platform)"
          - "  • Private GitHub Token (Global Engineering)"
          - "  • ServiceNow Production (IT Operations)"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "EXECUTION ENVIRONMENTS (7 new + 5 existing = 12 total):"
          - "═══════════════════════════════════════════════════════════════"
          - "  • Network Automation EE - network-ee:latest"
          - "  • ServiceNow EE - awx-ee:latest"
          - "  • Security Scanning EE - awx-ee:latest"
          - "  • Windows Automation EE - awx-ee:latest"
          - "  • Database Automation EE - awx-ee:latest"
          - "  • Kubernetes EE - kubernetes-ee:latest"
          - "  • Minimal EE - awx-minimal-ee:latest"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "JOB TEMPLATE SCHEDULES (9):"
          - "═══════════════════════════════════════════════════════════════"
          - "  Daily:"
          - "    • Daily Production Backup (2 AM)"
          - "    • Daily Health Check (6 AM)"
          - ""
          - "  Weekly:"
          - "    • Weekly Security Scan (Monday 1 AM)"
          - "    • Weekly System Updates (Sunday 3 AM)"
          - "    • Weekday Deployment (Mon-Fri 9 AM)"
          - "    • Bi-weekly Infrastructure Review"
          - ""
          - "  Monthly:"
          - "    • Monthly Full Backup (1st of month)"
          - ""
          - "  Hourly:"
          - "    • Hourly Monitoring Check (every 4 hours, disabled)"
          - "    • Database Integrity Check (every 6 hours)"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "PROJECT UPDATE SCHEDULES (5):"
          - "═══════════════════════════════════════════════════════════════"
          - "  • Web App Project - Hourly Sync"
          - "  • Infrastructure Project - Daily at 5 AM"
          - "  • Database Project - Daily at 4 AM"
          - "  • Security Project - Every 30 min (disabled)"
          - "  • Monitoring Project - Every 12 hours"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "INVENTORY SOURCE SCHEDULES (2):"
          - "═══════════════════════════════════════════════════════════════"
          - "  • Dynamic Inventory - Hourly Sync"
          - "  • Project File Inventory - Daily at 3 AM"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "RRULE PATTERNS USED:"
          - "═══════════════════════════════════════════════════════════════"
          - "  • FREQ=DAILY - Daily schedules"
          - "  • FREQ=WEEKLY;BYDAY=MO - Weekly on Monday"
          - "  • FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR - Weekdays only"
          - "  • FREQ=MONTHLY;BYMONTHDAY=1 - Monthly on 1st"
          - "  • FREQ=HOURLY;INTERVAL=4 - Every 4 hours"
          - "  • FREQ=MINUTELY;INTERVAL=30 - Every 30 minutes"
          - ""
          - "Migration will test:"
          - "  ✓ Custom credential type definitions (inputs, injectors)"
          - "  ✓ Credentials using custom types"
          - "  ✓ Execution environment definitions and images"
          - "  ✓ Schedule RRULE migration"
          - "  ✓ Schedule associations (jobs, projects, inventories)"
          - "  ✓ Schedule enabled/disabled states"
          - ""
          - "Next: Run migration to verify all these resources migrate correctly!"
