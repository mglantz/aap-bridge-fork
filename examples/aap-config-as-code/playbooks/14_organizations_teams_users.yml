---
- name: Create Organizations, Teams, and Users with RBAC
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../vars/aap_config.yml

  tasks:
    # Create Execution Environments first
    - name: Create Execution Environments
      ansible.builtin.uri:
        url: "{{ controller_auth.controller_host }}/api/v2/execution_environments/"
        method: POST
        headers:
          Authorization: "Bearer {{ controller_auth.controller_oauthtoken }}"
          Content-Type: application/json
        body_format: json
        body:
          name: "{{ item.name }}"
          description: "{{ item.description }}"
          image: "{{ item.image }}"
          pull: "{{ item.pull }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
        status_code: [201, 400]
      loop:
        - name: Default EE
          description: Default execution environment
          image: quay.io/ansible/awx-ee:latest
          pull: missing
        - name: Engineering EE
          description: Engineering team execution environment
          image: quay.io/ansible/creator-ee:latest
          pull: missing
        - name: Operations EE
          description: Operations team execution environment
          image: quay.io/ansible/awx-ee:latest
          pull: missing
        - name: Security EE
          description: Security team execution environment
          image: quay.io/ansible/awx-ee:latest
          pull: missing
        - name: Cloud EE
          description: Cloud operations execution environment
          image: quay.io/ansible/awx-ee:latest
          pull: missing
      register: ee_result
      ignore_errors: true
      tags: [execution_environments]

    # Create 5 Organizations with detailed configurations
    - name: Create Organizations with Details
      awx.awx.organization:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        max_hosts: "{{ item.max_hosts }}"
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        - name: Global Engineering
          description: Global engineering and development organization
          max_hosts: 1000

        - name: IT Operations
          description: IT operations and infrastructure management
          max_hosts: 2000

        - name: Security & Compliance
          description: Security operations and compliance team
          max_hosts: 500

        - name: Cloud Services
          description: Multi-cloud infrastructure and services
          max_hosts: 1500

        - name: DevOps Platform
          description: DevOps and CI/CD platform team
          max_hosts: 800
      tags: [organizations]

    # Set default EE for organizations
    - name: Get Organization IDs
      ansible.builtin.uri:
        url: "{{ controller_auth.controller_host }}/api/v2/organizations/?name={{ item.org_name | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ controller_auth.controller_oauthtoken }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        - org_name: Global Engineering
          ee_name: Engineering EE
        - org_name: IT Operations
          ee_name: Operations EE
        - org_name: Security & Compliance
          ee_name: Security EE
        - org_name: Cloud Services
          ee_name: Cloud EE
        - org_name: DevOps Platform
          ee_name: Default EE
      register: org_lookup
      tags: [organizations]

    - name: Get EE IDs
      ansible.builtin.uri:
        url: "{{ controller_auth.controller_host }}/api/v2/execution_environments/?name={{ item.ee_name | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ controller_auth.controller_oauthtoken }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        - org_name: Global Engineering
          ee_name: Engineering EE
        - org_name: IT Operations
          ee_name: Operations EE
        - org_name: Security & Compliance
          ee_name: Security EE
        - org_name: Cloud Services
          ee_name: Cloud EE
        - org_name: DevOps Platform
          ee_name: Default EE
      register: ee_lookup
      tags: [organizations]

    - name: Set Default Execution Environment for Organizations
      ansible.builtin.uri:
        url: "{{ controller_auth.controller_host }}/api/v2/organizations/{{ item.0.json.results[0].id }}/"
        method: PATCH
        headers:
          Authorization: "Bearer {{ controller_auth.controller_oauthtoken }}"
          Content-Type: application/json
        body_format: json
        body:
          default_environment: "{{ item.1.json.results[0].id }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
        status_code: [200, 400]
      loop: "{{ org_lookup.results | zip(ee_lookup.results) | list }}"
      when:
        - item.0.json.count > 0
        - item.1.json.count > 0
      ignore_errors: true
      tags: [organizations]

    # Create 20 Users with varied attributes
    - name: Create Users
      awx.awx.user:
