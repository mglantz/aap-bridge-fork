      tags: [users]

    # Create 10 Teams across organizations
    - name: Create Teams
      awx.awx.team:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        organization: "{{ item.organization }}"
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        # Global Engineering Teams
        - name: Backend Development
          description: Backend developers and API engineers
          organization: Global Engineering

        - name: Frontend Development
          description: Frontend and UI/UX developers
          organization: Global Engineering

        # IT Operations Teams
        - name: Infrastructure Team
          description: Infrastructure and systems administrators
          organization: IT Operations

        - name: Network Operations
          description: Network engineers and administrators
          organization: IT Operations

        # Security & Compliance Teams
        - name: Security Operations
          description: Security operations center team
          organization: Security & Compliance

        - name: Compliance Team
          description: Compliance and audit specialists
          organization: Security & Compliance

        # Cloud Services Teams
        - name: Cloud Infrastructure
          description: Multi-cloud infrastructure team
          organization: Cloud Services

        - name: Cloud Automation
          description: Cloud automation and orchestration
          organization: Cloud Services

        # DevOps Platform Teams
        - name: Platform Engineering
          description: Platform and tooling engineers
          organization: DevOps Platform

        - name: Site Reliability Engineering
          description: SRE and production operations
          organization: DevOps Platform
      tags: [teams]

    # Assign users to teams
    - name: Add Users to Teams
      awx.awx.role:
        user: "{{ item.user }}"
        target_team: "{{ item.team }}"
        role: "{{ item.role }}"
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        # Backend Development Team
        - user: sarah.engineering
          team: Backend Development
          role: admin
        - user: mike.developer
          team: Backend Development
          role: member
        - user: james.backend
          team: Backend Development
          role: member

        # Frontend Development Team
