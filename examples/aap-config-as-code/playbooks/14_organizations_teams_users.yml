          role: admin
      tags: [team_membership]

    # Assign organization-level roles to users
    - name: Assign Organization Admin Roles
      awx.awx.role:
        user: "{{ item.user }}"
        organization: "{{ item.organization }}"
        role: admin
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        - user: sarah.engineering
          organization: Global Engineering
        - user: robert.ops
          organization: IT Operations
        - user: john.security
          organization: Security & Compliance
        - user: chris.cloud
          organization: Cloud Services
        - user: daniel.devops
          organization: DevOps Platform
      tags: [org_roles]

    - name: Assign Organization Member Roles
      awx.awx.role:
        user: "{{ item.user }}"
        organization: "{{ item.organization }}"
        role: member
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        # Global Engineering members
        - user: mike.developer
