---
- name: Create Credentials
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../vars/aap_config.yml

  tasks:
    - name: Create SSH Machine Credentials
      awx.awx.credential:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        organization: "{{ item.organization | default(omit) }}"
        credential_type: Machine
        inputs:
          username: "{{ item.username }}"
          password: "{{ item.password | default(omit) }}"
          ssh_key_data: "{{ item.ssh_key | default(omit) }}"
          become_method: "{{ item.become_method | default('sudo') }}"
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        - name: Dev SSH Key
          description: SSH key for development servers
          organization: Engineering
          username: devuser
          password: dev_password_123
        - name: Prod SSH Key
          description: SSH key for production servers
          organization: Operations
          username: produser
          password: prod_password_456
        - name: QA SSH Key
          description: SSH key for QA servers
          organization: QA
          username: qauser
          password: qa_password_789
      tags: [ssh_credentials]

    - name: Create Source Control Credentials
      awx.awx.credential:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        organization: "{{ item.organization | default(omit) }}"
        credential_type: Source Control
        inputs:
          username: "{{ item.username }}"
          password: "{{ item.password }}"
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        - name: GitHub Credentials
          description: GitHub access for projects
          username: github_user
          password: ghp_token_placeholder
        - name: GitLab Credentials
          description: GitLab access for projects
          username: gitlab_user
          password: gitlab_token_placeholder
      tags: [scm_credentials]

    - name: Create Amazon Web Services Credentials
      awx.awx.credential:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        organization: "{{ item.organization | default(omit) }}"
        credential_type: Amazon Web Services
        inputs:
          username: "{{ item.access_key }}"
          password: "{{ item.secret_key }}"
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        - name: AWS Development Account
          description: AWS credentials for dev environment
          organization: Engineering
          access_key: AKIAIOSFODNN7EXAMPLE
          secret_key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
        - name: AWS Production Account
          description: AWS credentials for prod environment
          organization: Operations
          access_key: AKIAJEXAMPLEPRODUCTION
          secret_key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYPRODUCTION
      tags: [cloud_credentials, aws_credentials]

    - name: Create Microsoft Azure Credentials
      awx.awx.credential:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        organization: "{{ item.organization | default(omit) }}"
        credential_type: Microsoft Azure Resource Manager
        inputs:
          subscription: "{{ item.subscription_id }}"
          client: "{{ item.client_id }}"
          secret: "{{ item.client_secret }}"
          tenant: "{{ item.tenant_id }}"
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        - name: Azure Development
          description: Azure credentials for development
          organization: Engineering
          subscription_id: 12345678-1234-1234-1234-123456789012
          client_id: 87654321-4321-4321-4321-210987654321
          client_secret: azure_client_secret_placeholder
          tenant_id: abcdefab-abcd-abcd-abcd-abcdefabcdef
      tags: [cloud_credentials, azure_credentials]

    - name: Create Vault Credentials
      awx.awx.credential:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        credential_type: Vault
        inputs:
          vault_password: "{{ item.vault_password }}"
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        - name: Ansible Vault - Dev
          description: Vault password for development
          vault_password: dev_vault_password
        - name: Ansible Vault - Prod
          description: Vault password for production
          vault_password: prod_vault_password
      tags: [vault_credentials]

    - name: Create Network Credentials
      awx.awx.credential:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        organization: "{{ item.organization | default(omit) }}"
        credential_type: Network
        inputs:
          username: "{{ item.username }}"
          password: "{{ item.password }}"
          authorize: "{{ item.authorize | default(false) }}"
        state: present
        controller_host: "{{ controller_auth.controller_host }}"
        controller_username: "{{ controller_auth.controller_username | default(omit) }}"
        controller_password: "{{ controller_auth.controller_password | default(omit) }}"
        controller_oauthtoken: "{{ controller_auth.controller_oauthtoken | default(omit) }}"
        validate_certs: "{{ controller_auth.validate_certs }}"
      loop:
        - name: Network Devices Credential
          description: Credentials for network equipment
          organization: Operations
          username: netadmin
          password: network_password_123
          authorize: true
      tags: [network_credentials]
