---
# DEMO CREDENTIAL MIGRATION PLAYBOOK
# This is what the export script generates

- name: Migrate Credentials from Source AAP to Target AAP
  hosts: localhost
  gather_facts: false
  vars:
    target_controller_host: https://localhost:10443
    target_controller_token: '{{ lookup(''env'', ''TARGET__TOKEN'') }}'
  tasks:
  - name: 'Create credential: Demo SSH Credential'
    awx.awx.credential:
      name: Demo SSH Credential
      description: SSH access for demo servers
      credential_type: Machine
      state: present
      controller_host: '{{ target_controller_host }}'
      controller_oauthtoken: '{{ target_controller_token }}'
      validate_certs: false
      organization: Engineering
      inputs:
        username: admin
        password: REPLACE_WITH_ACTUAL_PASSWORD
        ssh_key_unlock: REPLACE_WITH_ACTUAL_SSH_KEY_UNLOCK
    '# SECRETS_NEEDED': 'Fill in: password, ssh_key_unlock'
  - name: 'Create credential: GitHub Access Token'
    awx.awx.credential:
      name: GitHub Access Token
      description: GitHub SCM access
      credential_type: Source Control
      state: present
      controller_host: '{{ target_controller_host }}'
      controller_oauthtoken: '{{ target_controller_token }}'
      validate_certs: false
      inputs:
        username: github_user
        password: REPLACE_WITH_ACTUAL_PASSWORD
    '# SECRETS_NEEDED': 'Fill in: password'
  - name: 'Create credential: AWS Production Account'
    awx.awx.credential:
      name: AWS Production Account
      description: AWS credentials for production
      credential_type: Amazon Web Services
      state: present
      controller_host: '{{ target_controller_host }}'
      controller_oauthtoken: '{{ target_controller_token }}'
      validate_certs: false
      organization: Operations
      inputs:
        username: AKIAIOSFODNN7EXAMPLE
        password: REPLACE_WITH_ACTUAL_PASSWORD
    '# SECRETS_NEEDED': 'Fill in: password'
  - name: 'Create credential: Automation Hub Token'
    awx.awx.credential:
      name: Automation Hub Token
      description: Galaxy/Hub API access
      credential_type: Ansible Galaxy/Automation Hub API Token
      state: present
      controller_host: '{{ target_controller_host }}'
      controller_oauthtoken: '{{ target_controller_token }}'
      validate_certs: false
      inputs:
        url: https://192.168.100.26/api/galaxy/content/validated/
        token: REPLACE_WITH_ACTUAL_TOKEN
    '# SECRETS_NEEDED': 'Fill in: token'
