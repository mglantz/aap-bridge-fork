---
# CREDENTIAL MIGRATION PLAYBOOK - Direct API Version
# Uses direct REST API calls to work with AAP 2.6 Platform Gateway

- name: Migrate Credentials from Source AAP to Target AAP
  hosts: localhost
  gather_facts: false
  vars:
    target_controller_url: https://localhost:10443/api/controller/v2
    target_controller_token: '{{ lookup(''env'', ''TARGET__TOKEN'') }}'
  tasks:
  - name: Get credential types from target AAP
    uri:
      url: '{{ target_controller_url }}/credential_types/'
      method: GET
      headers:
        Authorization: Bearer {{ target_controller_token }}
        Content-Type: application/json
      validate_certs: false
      status_code: 200
    register: credential_types_response
  - name: Build credential type name to ID mapping
    set_fact:
      credential_type_map: '{{ dict(credential_types_response.json.results | map(attribute=''name'') | zip(credential_types_response.json.results
        | map(attribute=''id''))) }}'
  - name: Get organizations from target AAP
    uri:
      url: '{{ target_controller_url }}/organizations/'
      method: GET
      headers:
        Authorization: Bearer {{ target_controller_token }}
        Content-Type: application/json
      validate_certs: false
      status_code: 200
    register: organizations_response
  - name: Build organization name to ID mapping
    set_fact:
      organization_map: '{{ dict(organizations_response.json.results | map(attribute=''name'') | zip(organizations_response.json.results
        | map(attribute=''id''))) }}'
  - name: 'Create credential: Ansible Galaxy'
    uri:
      url: '{{ target_controller_url }}/credentials/'
      method: POST
      headers:
        Authorization: Bearer {{ target_controller_token }}
        Content-Type: application/json
      body:
        name: Ansible Galaxy
        description: ''
        credential_type: '{{ credential_type_map[''Ansible Galaxy/Automation Hub API Token''] | default(1) }}'
        inputs:
          url: https://galaxy.ansible.com/
      body_format: json
      validate_certs: false
      status_code:
      - 201
      - 400
    register: credential_1_result
    failed_when: credential_1_result.status not in [201, 400]
  - name: 'Show result for: Ansible Galaxy'
    debug:
      msg: '{{ credential_1_result.status == 201 and ''Created'' or ''Already exists or error'' }}'
  - name: 'Create credential: Automation Hub Community Repository'
    uri:
      url: '{{ target_controller_url }}/credentials/'
      method: POST
      headers:
        Authorization: Bearer {{ target_controller_token }}
        Content-Type: application/json
      body:
        name: Automation Hub Community Repository
        description: ''
        credential_type: '{{ credential_type_map[''Ansible Galaxy/Automation Hub API Token''] | default(1) }}'
        inputs:
          url: https://192.168.100.26/api/galaxy/content/community/
          token: test_value_placeholderTOKEN
      body_format: json
      validate_certs: false
      status_code:
      - 201
