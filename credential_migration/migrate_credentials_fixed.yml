    uri:
      url: '{{ target_controller_url }}/credentials/'
      method: POST
      headers:
        Authorization: Bearer {{ target_controller_token }}
        Content-Type: application/json
      body:
        name: Ansible Galaxy
        description: ''
        credential_type: 19
        organization: 1
        inputs:
          url: https://galaxy.ansible.com/
      body_format: json
      validate_certs: false
      status_code:
      - 201
      - 400
    register: credential_1_result
    ignore_errors: true
  - name: "\u2705 Created: Ansible Galaxy"
    debug:
      msg: 'Credential created successfully (ID: {{ credential_1_result.json.id }})'
    when: credential_1_result.status == 201
  - name: "\u26A0\uFE0F  Skipped: Ansible Galaxy"
    debug:
      msg: '{{ credential_1_result.json }}'
    when: credential_1_result.status == 400
