      msg: 'Credential created successfully (ID: {{ credential_49_result.json.id }})'
    when: credential_49_result.status == 201
  - name: "\u26A0\uFE0F  Skipped: Vault-Backed AWS Credential"
    debug:
      msg: '{{ credential_49_result.json }}'
    when: credential_49_result.status == 400
  - name: 'Create credential: Vault-Backed SSH Credential'
    uri:
      url: '{{ target_controller_url }}/credentials/'
      method: POST
      headers:
        Authorization: Bearer {{ target_controller_token }}
        Content-Type: application/json
      body:
        name: Vault-Backed SSH Credential
        description: SSH credential with secrets pulled from HashiCorp Vault
        credential_type: 1
        organization: 8
        inputs:
          username: ansible-automation
      body_format: json
      validate_certs: false
      status_code:
      - 201
      - 400
    register: credential_50_result
    ignore_errors: true
  - name: "\u2705 Created: Vault-Backed SSH Credential"
    debug:
      msg: 'Credential created successfully (ID: {{ credential_50_result.json.id }})'
    when: credential_50_result.status == 201
  - name: "\u26A0\uFE0F  Skipped: Vault-Backed SSH Credential"
    debug:
      msg: '{{ credential_50_result.json }}'
    when: credential_50_result.status == 400
