---
# CREDENTIAL MIGRATION PLAYBOOK - Direct API Version (Fixed)
# Uses direct REST API calls with actual numeric IDs
# No Jinja2 evaluation issues - all IDs resolved at generation time

- name: Migrate Credentials from Source AAP to Target AAP
  hosts: localhost
  gather_facts: false
  vars:
    target_controller_url: https://localhost:10443/api/controller/v2
    target_controller_token: '{{ lookup(''env'', ''TARGET__TOKEN'') }}'
